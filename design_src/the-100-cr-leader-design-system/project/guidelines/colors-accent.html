<!-- @dsCard group="Colors" viewport="700x180" name="Accent & Sand" subtitle="Navy headline ink · sand display · gold highlight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-label); background: var(--paper); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; height: 120px; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
  .name { font-size: 13px; font-weight: 700; }
  .hex { font-size: 12px; opacity: 0.75; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--navy);color:#fff"><span class="name">navy</span><span class="hex">#12265C</span></div>
    <div class="sw" style="background:var(--sand);color:var(--forest)"><span class="name">sand</span><span class="hex">#D6D3B2</span></div>
    <div class="sw" style="background:var(--gold);color:var(--forest)"><span class="name">gold</span><span class="hex">#FBBC04</span></div>
  </div>
</body>
</html>
