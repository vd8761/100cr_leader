<!-- @dsCard group="Brand" viewport="700x230" name="Wordmark" subtitle="The Bebas Neue lockup and small nav mark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--forest); color: var(--sand); display:flex; flex-direction:column; gap:22px; align-items:center; justify-content:center; height: 100vh; box-sizing:border-box; }
  .mark { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--ls-display); line-height: 0.9; }
  .big { font-size: 80px; }
  .nav { font-size: 26px; color: var(--text-on-dark); display:flex; gap:18px; align-items:center; }
  .nav .pod { font-family: var(--font-sans); font-weight: var(--fw-light); font-size: 16px; color: var(--text-on-dark-muted); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="mark big">THE 100 CR LEADER</div>
  <div class="nav"><span class="mark" style="font-size:26px">THE 100 CR LEADER</span><span class="pod">· podcast</span></div>
</body>
</html>
