<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--paper); color: var(--text-on-light); padding: 24px 32px; }
  .h { margin: 0 0 6px; font-weight: var(--fw-light); letter-spacing: var(--ls-tight); line-height: 1.1; }
  .lab { font-size: 11px; color: var(--text-on-light-muted); }
  .stack > div { margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="stack">
    <div><p class="h" style="font-size:64px">Bharathiraja</p><span class="lab">H1 · 64 / Light</span></div>
    <div><p class="h" style="font-size:40px">100 Crore Leader - the show.</p><span class="lab">H2 · 40 / Light</span></div>
    <div><p class="h" style="font-size:24px">Featured Episodes</p><span class="lab">H4 · 24 / Light</span></div>
  </div>
</body>
</html>
