<!-- @dsCard group="Colors" viewport="700x190" name="Platform Brand Colors" subtitle="Listening-platform & social accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-label); background: var(--paper); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 20px; }
  .sw { height: 56px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; color: #fff; }
  .name { font-size: 11px; font-weight: 700; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:var(--spotify)"><span class="name">spotify</span></div>
    <div class="sw" style="background:var(--youtube)"><span class="name">youtube</span></div>
    <div class="sw" style="background:var(--jiosaavn)"><span class="name">jiosaavn</span></div>
    <div class="sw" style="background:var(--whatsapp)"><span class="name">whatsapp</span></div>
    <div class="sw" style="background:var(--facebook)"><span class="name">facebook</span></div>
    <div class="sw" style="background:var(--linkedin)"><span class="name">linkedin</span></div>
    <div class="sw" style="background:var(--instagram)"><span class="name">instagram</span></div>
    <div class="sw" style="background:var(--google-blue)"><span class="name">g-blue</span></div>
    <div class="sw" style="background:var(--google-red)"><span class="name">g-red</span></div>
    <div class="sw" style="background:var(--google-green)"><span class="name">g-green</span></div>
  </div>
</body>
</html>
