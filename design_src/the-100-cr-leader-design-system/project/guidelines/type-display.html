<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; font-family: var(--font-sans); background: var(--forest); color: var(--sand); padding: 26px 32px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
  .disp { font-family: var(--font-display); text-transform: uppercase; letter-spacing: var(--ls-display); line-height: 0.88; margin: 0; }
  .big { font-size: 76px; }
  .meta { font-size: 12px; color: var(--text-on-dark-muted); margin-top: 18px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <h1 class="disp big">THE 100 CR LEADER</h1>
  <div class="meta">Bebas Neue · uppercase · tracking +0.01em · line-height 0.9 - used only on forest, in sand</div>
</body>
</html>
