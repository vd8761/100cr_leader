<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows" subtitle="Soft, low-contrast elevation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-label); background: var(--paper); }
  .row { display: flex; gap: 28px; padding: 30px; }
  .cap { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .b { width: 120px; height: 80px; background: var(--cream); border-radius: var(--radius); }
  .lab { font-size: 11px; color: var(--text-on-light-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="cap"><div class="b" style="box-shadow:var(--shadow-sm)"></div><span class="lab">shadow-sm</span></div>
    <div class="cap"><div class="b" style="box-shadow:var(--shadow)"></div><span class="lab">shadow</span></div>
    <div class="cap"><div class="b" style="box-shadow:var(--shadow-lg)"></div><span class="lab">shadow-lg</span></div>
    <div class="cap"><div class="b" style="box-shadow:var(--shadow-photo)"></div><span class="lab">shadow-photo</span></div>
  </div>
</body>
</html>
