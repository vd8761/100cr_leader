<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base · 80px page gutter & section rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-label); background: var(--paper); padding: 22px 32px; color: var(--text-on-light); }
  .r { display:flex; align-items:center; gap:14px; margin-bottom:9px; }
  .bar { height: 14px; background: var(--forest); border-radius: 3px; }
  .lab { font-size: 12px; width: 110px; color: var(--text-on-light-muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="r"><span class="lab">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="lab">space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="lab">space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="lab">space-10 · 40</span><div class="bar" style="width:40px"></div></div>
  <div class="r"><span class="lab">space-20 · 80</span><div class="bar" style="width:80px"></div></div>
  <div class="r"><span class="lab">space-32 · 128</span><div class="bar" style="width:128px"></div></div>
</body>
</html>
