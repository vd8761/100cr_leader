<!-- @dsCard group="Colors" viewport="700x180" name="Paper Neutrals" subtitle="Warm light surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-label); background: var(--forest); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; height: 120px; border-radius: var(--radius); display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; border: 1px solid var(--rule-light); color: var(--forest); }
  .name { font-size: 13px; font-weight: 700; }
  .hex { font-size: 12px; opacity: 0.6; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--paper)"><span class="name">paper</span><span class="hex">#F2F1E7</span></div>
    <div class="sw" style="background:var(--paper-2)"><span class="name">paper-2</span><span class="hex">#EEEDE1</span></div>
    <div class="sw" style="background:var(--paper-3)"><span class="name">paper-3</span><span class="hex">#E8E6D6</span></div>
    <div class="sw" style="background:var(--cream)"><span class="name">cream</span><span class="hex">#FFFEF1</span></div>
    <div class="sw" style="background:var(--white)"><span class="name">white</span><span class="hex">#FFFFFF</span></div>
  </div>
</body>
</html>
